<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>采购流程 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">采购流程</div>
          <div class="page-subtitle">采购订单管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新建采购单</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">采购订单</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索供应商/项目">
            </div>
            <select class="form-control" id="status-filter" style="width:120px">
              <option value="">全部状态</option>
              <option>已到货</option>
              <option>运输中</option>
              <option>待发货</option>
              <option>待审核</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>订单号</th><th>供应商</th><th>采购项目</th><th>数量</th><th>单价</th><th>金额</th><th>创建日期</th><th>交货日期</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="order-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/编辑采购订单弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新建采购单</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="order-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">供应商名称</label>
              <input class="form-control" id="f-supplierName" placeholder="请输入供应商名称">
            </div>
            <div class="form-group">
              <label class="form-label required">采购物料</label>
              <input class="form-control" id="f-item" placeholder="请输入采购物料">
            </div>
            <div class="form-group">
              <label class="form-label">数量</label>
              <input class="form-control" type="number" id="f-quantity" placeholder="请输入数量">
            </div>
            <div class="form-group">
              <label class="form-label">单位</label>
              <input class="form-control" id="f-unit" placeholder="请输入单位">
            </div>
            <div class="form-group">
              <label class="form-label">单价</label>
              <input class="form-control" type="number" id="f-unitPrice" placeholder="请输入单价">
            </div>
            <div class="form-group">
              <label class="form-label">状态</label>
              <select class="form-control" id="f-status">
                <option value="待审核">待审核</option>
                <option value="已审核">已审核</option>
                <option value="运输中">运输中</option>
                <option value="已到货">已到货</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">交货日期</label>
              <input class="form-control" type="date" id="f-deliveryDate">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
