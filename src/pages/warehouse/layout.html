<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>货位管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">货位管理</div>
          <div class="page-subtitle">仓库货位与容量管理</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header"><div class="card-title">货位列表</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>货位编码</th><th>区域</th><th>类型</th><th>总容量</th><th>已占用</th><th>使用率</th><th>状态</th></tr>
            </thead>
            <tbody id="layout-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 库存分布 -->
      <div class="card" style="margin-top:var(--spacing-lg)">
        <div class="card-header"><div class="card-title">货位库存明细</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>物品名称</th><th>分类</th><th>规格</th><th>货位</th><th>库存量</th><th>最后更新</th></tr>
            </thead>
            <tbody id="detail-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/warehouse.js"></script>
</body>
</html>
