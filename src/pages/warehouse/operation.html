<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>基本操作 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">基本操作</div>
          <div class="page-subtitle">出入库操作记录</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <!-- 入库记录 -->
      <div class="card">
        <div class="card-header"><div class="card-title">📥 入库记录</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>单号</th><th>物品</th><th>数量</th><th>来源</th><th>入库日期</th><th>操作员</th></tr>
            </thead>
            <tbody id="inbound-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 出库记录 -->
      <div class="card" style="margin-top:var(--spacing-lg)">
        <div class="card-header"><div class="card-title">📤 出库记录</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>单号</th><th>物品</th><th>数量</th><th>去向</th><th>出库日期</th><th>操作员</th></tr>
            </thead>
            <tbody id="outbound-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/warehouse.js"></script>
</body>
</html>
