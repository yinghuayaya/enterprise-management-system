<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">设备管理</div>
          <div class="page-subtitle">设备全生命周期管理</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:var(--spacing-md);margin-top:var(--spacing-lg)">
        <a href="monitor.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">📡</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">状态监控</div><div class="stat-label">实时设备运行状态</div></div>
        </a>
        <a href="maintenance.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">🔧</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">维护计划</div><div class="stat-label">设备维护计划管理</div></div>
        </a>
        <a href="fault.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">⚠️</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">故障记录</div><div class="stat-label">故障记录与分析</div></div>
        </a>
        <a href="info.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">📋</div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">设备信息</div><div class="stat-label">设备档案管理</div></div>
        </a>
      </div>

      <div class="card" style="margin-top:var(--spacing-lg)">
        <div class="card-header">
          <div class="card-title">设备状态总览</div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>设备编号</th><th>设备名称</th><th>型号</th><th>位置</th><th>下次维护</th><th>状态</th></tr>
            </thead>
            <tbody id="equip-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

<script src="../../assets/js/utils/dom.js"></script>
<script src="../../assets/js/utils/storage.js"></script>
<script src="../../assets/js/utils/format.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/navigation.js"></script>
<script src="../../assets/js/modules/mobile-nav.js"></script>
<script src="../../assets/js/main.js"></script>
  <script src="../../data/equipment.js"></script>
<script>
'use strict';
let headerLoaded = false;
let sidebarLoaded = false;

function tryInitMobileNav() {
  if (headerLoaded && sidebarLoaded) {
    if (typeof MobileNav !== 'undefined') MobileNav.init();
  }
}

fetch('../../components/header.html').then(r => r.text()).then(html => {
  document.getElementById('header-placeholder').innerHTML = html;
  appNav.init();
  headerLoaded = true;
  tryInitMobileNav();
});
fetch('../../components/sidebar.html').then(r => r.text()).then(html => {
  document.getElementById('sidebar-placeholder').innerHTML = html;
  sidebarLoaded = true;
  tryInitMobileNav();
});

    const { equipment, faults, maintenance } = equipmentData;
    const running = equipment.filter(e => e.status === '运行中').length;
    const repairing = equipment.filter(e => e.status === '维修中').length;
    const stopped = equipment.filter(e => e.status === '停机').length;
    const pendingFaults = faults.filter(f => f.status !== '已解决').length;

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-icon">🏭</div><div class="stat-info"><div class="stat-value">${equipment.length}</div><div class="stat-label">设备总数</div></div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-info"><div class="stat-value">${running}</div><div class="stat-label">运行中</div></div></div>
      <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-info"><div class="stat-value">${repairing}</div><div class="stat-label">维修中</div></div></div>
      <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-info"><div class="stat-value">${pendingFaults}</div><div class="stat-label">待处理故障</div></div></div>
    `;

    const statusMap = { '运行中': 'badge-success', '维修中': 'badge-warning', '停机': 'badge-danger' };
    document.getElementById('equip-tbody').innerHTML = equipment.map(e => `
      <tr>
        <td>${e.id}</td>
        <td><strong>${e.name}</strong></td>
        <td>${e.model}</td>
        <td>${e.location}</td>
        <td>${e.nextMaintain}</td>
        <td><span class="badge ${statusMap[e.status] || 'badge-default'}">${e.status}</span></td>
      </tr>
    `).join('');
  </script>
</body>
</html>
