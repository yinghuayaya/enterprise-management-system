<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>设备信息 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">设备信息</div>
          <div class="page-subtitle">设备档案管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新增设备</button>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">设备档案</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索设备名称/型号">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>设备编号</th><th>设备名称</th><th>型号</th><th>位置</th><th>购入日期</th><th>上次维护</th><th>下次维护</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="info-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/编辑设备弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新增设备</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="equip-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">设备名称</label>
              <input class="form-control" id="f-name" placeholder="请输入设备名称">
            </div>
            <div class="form-group">
              <label class="form-label">设备型号</label>
              <input class="form-control" id="f-model" placeholder="请输入设备型号">
            </div>
            <div class="form-group">
              <label class="form-label">设备位置</label>
              <input class="form-control" id="f-location" placeholder="请输入设备位置">
            </div>
            <div class="form-group">
              <label class="form-label">设备状态</label>
              <select class="form-control" id="f-status">
                <option value="运行中">运行中</option>
                <option value="维修中">维修中</option>
                <option value="停机">停机</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">购入日期</label>
              <input class="form-control" type="date" id="f-purchaseDate">
            </div>
            <div class="form-group">
              <label class="form-label">上次维护</label>
              <input class="form-control" type="date" id="f-lastMaintain">
            </div>
            <div class="form-group">
              <label class="form-label">下次维护</label>
              <input class="form-control" type="date" id="f-nextMaintain">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>
<script src="../../assets/js/main.js"></script>
</body>
</html>
