<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>设备信息 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">设备信息</div>
          <div class="page-subtitle">设备档案管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新增设备</button>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">设备档案</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索设备名称/型号">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>设备编号</th><th>设备名称</th><th>型号</th><th>位置</th><th>购入日期</th><th>上次维护</th><th>下次维护</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="info-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">设备详情</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">关闭</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/equipment.js"></script>
</body>
</html>
