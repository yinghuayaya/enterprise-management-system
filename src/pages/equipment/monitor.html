<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>状态监控 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">状态监控</div>
          <div class="page-subtitle">实时设备运行状态</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header"><div class="card-title">设备运行状态</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>设备编号</th><th>设备名称</th><th>型号</th><th>位置</th><th>购入日期</th><th>上次维护</th><th>下次维护</th><th>状态</th></tr>
            </thead>
            <tbody id="monitor-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
<script src="../../assets/js/main.js"></script>
</body>
</html>
