<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>员工管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">员工管理</div>
          <div class="page-subtitle">管理公司全体员工信息</div>
        </div>
        <div>
          <a href="info.html" class="btn btn-primary">+ 新增员工</a>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- 快捷入口 -->
      <div class="stats-grid" style="margin-bottom: var(--spacing-lg);">
        <a href="info.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">👤</div>
          <div class="stat-info">
            <div class="stat-value" style="font-size:var(--font-size-lg)">员工信息</div>
            <div class="stat-label">查看与管理员工档案</div>
          </div>
        </a>
        <a href="attendance.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">📅</div>
          <div class="stat-info">
            <div class="stat-value" style="font-size:var(--font-size-lg)">考勤薪资</div>
            <div class="stat-label">考勤记录与薪资核算</div>
          </div>
        </a>
        <a href="recruitment.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">📋</div>
          <div class="stat-info">
            <div class="stat-value" style="font-size:var(--font-size-lg)">招聘培训</div>
            <div class="stat-label">招聘计划与培训管理</div>
          </div>
        </a>
        <a href="performance.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon">🏆</div>
          <div class="stat-info">
            <div class="stat-value" style="font-size:var(--font-size-lg)">绩效评估</div>
            <div class="stat-label">季度绩效考核结果</div>
          </div>
        </a>
      </div>

      <!-- 员工列表 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">员工列表</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索姓名/部门/职位">
            </div>
            <select class="form-control" id="dept-filter" style="width:120px">
              <option value="">全部部门</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>工号</th>
                <th>姓名</th>
                <th>性别</th>
                <th>部门</th>
                <th>职位</th>
                <th>入职日期</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="employee-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 模态框 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">员工详情</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">关闭</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/utils/dom.js"></script>
<script src="../../assets/js/utils/storage.js"></script>
<script src="../../assets/js/utils/format.js"></script>
<script src="../../assets/js/modules/auth.js"></script>
<script src="../../assets/js/modules/navigation.js"></script>
<script src="../../assets/js/modules/mobile-nav.js"></script>
<script src="../../assets/js/main.js"></script>
  <script src="../../data/employee.js"></script>
</body>
</html>
