<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>员工信息 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">员工信息</div>
          <div class="page-subtitle">员工档案管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新增员工</button>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">员工档案</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索姓名/工号">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>工号</th><th>姓名</th><th>性别</th><th>部门</th>
                <th>职位</th><th>手机</th><th>入职日期</th><th>薪资</th><th>状态</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="info-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/编辑弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新增员工</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="emp-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">姓名</label>
              <input class="form-control" id="f-name" placeholder="请输入姓名">
            </div>
            <div class="form-group">
              <label class="form-label required">性别</label>
              <select class="form-control" id="f-gender">
                <option value="男">男</option>
                <option value="女">女</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label required">部门</label>
              <input class="form-control" id="f-dept" placeholder="请输入部门">
            </div>
            <div class="form-group">
              <label class="form-label required">职位</label>
              <input class="form-control" id="f-position" placeholder="请输入职位">
            </div>
            <div class="form-group">
              <label class="form-label">手机</label>
              <input class="form-control" id="f-phone" placeholder="请输入手机号">
            </div>
            <div class="form-group">
              <label class="form-label">邮箱</label>
              <input class="form-control" id="f-email" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
              <label class="form-label">入职日期</label>
              <input class="form-control" type="date" id="f-entryDate">
            </div>
            <div class="form-group">
              <label class="form-label">薪资</label>
              <input class="form-control" type="number" id="f-salary" placeholder="请输入薪资">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/employee.js"></script>
</body>
</html>
