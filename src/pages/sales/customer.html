<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>客户信息 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">客户信息</div>
          <div class="page-subtitle">客户档案管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新增客户</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">客户列表</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索客户名称/联系人">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>客户名称</th><th>联系人</th><th>手机</th><th>城市</th><th>客户等级</th><th>累计金额</th><th>操作</th></tr>
            </thead>
            <tbody id="customer-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/编辑客户弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新增客户</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="customer-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">客户名称</label>
              <input class="form-control" id="f-name" placeholder="请输入客户名称">
            </div>
            <div class="form-group">
              <label class="form-label required">联系人</label>
              <input class="form-control" id="f-contact" placeholder="请输入联系人">
            </div>
            <div class="form-group">
              <label class="form-label">联系电话</label>
              <input class="form-control" id="f-phone" placeholder="请输入联系电话">
            </div>
            <div class="form-group">
              <label class="form-label">邮箱</label>
              <input class="form-control" id="f-email" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
              <label class="form-label">所在城市</label>
              <input class="form-control" id="f-city" placeholder="请输入城市">
            </div>
            <div class="form-group">
              <label class="form-label">客户等级</label>
              <select class="form-control" id="f-level">
                <option value="普通">普通</option>
                <option value="重要">重要</option>
                <option value="VIP">VIP</option>
              </select>
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
