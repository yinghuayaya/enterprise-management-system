<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>销售订单 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">销售订单</div>
          <div class="page-subtitle">订单跟踪与管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新建订单</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">订单列表</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索客户/产品">
            </div>
            <select class="form-control" id="status-filter" style="width:120px">
              <option value="">全部状态</option>
              <option>已完成</option>
              <option>配送中</option>
              <option>待发货</option>
              <option>待审核</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>订单号</th><th>客户</th><th>产品</th><th>数量</th><th>单价</th><th>金额</th><th>创建日期</th><th>交货日期</th><th>状态</th></tr>
            </thead>
            <tbody id="order-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/sales.js"></script>
</body>
</html>
