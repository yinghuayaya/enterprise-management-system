<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>质量管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">质量管理</div>
          <div class="page-subtitle">质检记录与分析</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header"><div class="card-title">质检记录</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>记录编号</th><th>订单号</th><th>质检员</th><th>质检日期</th><th>缺陷数</th><th>结果</th></tr>
            </thead>
            <tbody id="quality-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
<script src="../../assets/js/main.js"></script>
</body>
</html>
