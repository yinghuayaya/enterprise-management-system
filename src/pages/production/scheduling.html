<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>任务排产 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">任务排产</div>
          <div class="page-subtitle">生产任务分配与进度跟踪</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新建任务</button>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">任务列表</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="搜索产品/负责人">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>任务编号</th><th>所属计划</th><th>产品</th><th>数量</th><th>负责人</th><th>截止日期</th><th>进度</th><th>操作</th></tr>
            </thead>
            <tbody id="task-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/编辑生产任务弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新建任务</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="task-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">所属计划编号</label>
              <input class="form-control" id="f-planId" placeholder="请输入计划编号">
            </div>
            <div class="form-group">
              <label class="form-label required">产品名称</label>
              <input class="form-control" id="f-productName" placeholder="请输入产品名称">
            </div>
            <div class="form-group">
              <label class="form-label">数量</label>
              <input class="form-control" type="number" id="f-quantity" placeholder="请输入数量">
            </div>
            <div class="form-group">
              <label class="form-label">进度 (0-100)</label>
              <input class="form-control" type="number" id="f-progress" min="0" max="100" placeholder="0">
            </div>
            <div class="form-group">
              <label class="form-label">负责人</label>
              <input class="form-control" id="f-assignee" placeholder="请输入负责人">
            </div>
            <div class="form-group">
              <label class="form-label">截止日期</label>
              <input class="form-control" type="date" id="f-deadline">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
