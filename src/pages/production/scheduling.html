<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>任务排产 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">任务排产</div>
          <div class="page-subtitle">生产任务分配与进度跟踪</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">任务列表</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>任务编号</th><th>所属计划</th><th>产品</th><th>数量</th><th>负责人</th><th>截止日期</th><th>进度</th></tr>
            </thead>
            <tbody id="task-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/production.js"></script>
</body>
</html>
