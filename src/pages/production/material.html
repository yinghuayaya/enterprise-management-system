<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>物料需求 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">物料需求计划</div>
          <div class="page-subtitle">物料库存与短缺分析</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header"><div class="card-title">物料清单</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>物料名称</th><th>规格</th><th>单位</th><th>需求量</th><th>库存量</th><th>短缺量</th><th>状态</th></tr>
            </thead>
            <tbody id="material-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/utils/dom.js"></script>
  <script src="../../assets/js/utils/storage.js"></script>
  <script src="../../assets/js/utils/format.js"></script>
  <script src="../../assets/js/modules/auth.js"></script>
  <script src="../../assets/js/modules/navigation.js"></script>
  <script src="../../assets/js/main.js"></script>
  <script src="../../data/production.js"></script>
</body>
</html>
