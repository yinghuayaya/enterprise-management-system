<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>生产计划 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">生产计划</div>
          <div class="page-subtitle">制定与管理生产计划</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新建计划</button>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">计划列表</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>计划名称</th><th>开始日期</th><th>结束日期</th><th>产品</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="plan-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
<script src="../../assets/js/main.js"></script>
</body>
</html>
