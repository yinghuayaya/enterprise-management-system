<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>生产计划 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">生产计划</div>
          <div class="page-subtitle">制定与管理生产计划</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新建计划</button>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">计划列表</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>计划名称</th><th>开始日期</th><th>结束日期</th><th>产品</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="plan-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <!-- 新增/编辑生产计划弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新建计划</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="plan-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">计划名称</label>
              <input class="form-control" id="f-name" placeholder="请输入计划名称">
            </div>
            <div class="form-group">
              <label class="form-label">开始日期</label>
              <input class="form-control" type="date" id="f-startDate">
            </div>
            <div class="form-group">
              <label class="form-label">结束日期</label>
              <input class="form-control" type="date" id="f-endDate">
            </div>
            <div class="form-group">
              <label class="form-label">计划状态</label>
              <select class="form-control" id="f-status">
                <option value="待启动">待启动</option>
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
              </select>
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
