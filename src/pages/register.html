<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 小麦科技</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <div class="login-page">
    <div class="login-side">
      <div class="login-side-content fade-in">
        <img src="../assets/images/logo.png" alt="小麦科技" style="height:80px; margin-bottom:24px;">
        <h1>加入小麦，共创未来</h1>
        <p>年轻人的智能科技平台。立即注册开启智能之旅。</p>
      </div>
    </div>
    <div class="login-form-container">
      <div class="login-box fade-in">
      
        <div class="login-title">账号注册</div>
        <form id="register-form">
          <div class="form-group">
            <label class="form-label required" for="username">用户名</label>
            <input class="form-control" type="text" id="username" name="username" placeholder="请输入用户名">
            <div class="form-error" id="username-error"></div>
          </div>
          <div class="form-group">
            <label class="form-label required" for="email">邮箱</label>
            <input class="form-control" type="email" id="email" name="email" placeholder="请输入您的工作邮箱">
            <div class="form-error" id="email-error"></div>
          </div>
          <div class="form-group">
            <label class="form-label required" for="password">密码</label>
            <input class="form-control" type="password" id="password" name="password" placeholder="请输入至少6位密码">
            <div class="form-error" id="password-error"></div>
          </div>
          <div class="form-group">
            <label class="form-label required" for="confirmPassword">确认密码</label>
            <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码">
            <div class="form-error" id="confirmPassword-error"></div>
          </div>
          <div class="form-error" id="register-error"></div>
          <button type="submit" class="btn btn-primary">立即注册</button>
        </form>
        <div class="login-footer">
          已有账号？<a href="login.html">立即登录</a>
        </div>
      </div>
    </div>
  </div>

<script src="../assets/js/utils/storage.js"></script>
<script src="../assets/js/utils/validate.js"></script>
<script src="../assets/js/modules/auth.js"></script>
<script>
'use strict';
// validate.js 导出的是 validators，创建别名
const validate = validators;

// 已登录则直接跳转
    if (auth.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('register-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Clear errors
      document.getElementById('username-error').textContent = '';
      document.getElementById('email-error').textContent = '';
      document.getElementById('password-error').textContent = '';
      document.getElementById('confirmPassword-error').textContent = '';
      document.getElementById('register-error').textContent = '';

      // Validation
      if (!username) {
        document.getElementById('username-error').textContent = '请输入用户名';
        return;
      }
      if (!email) {
        document.getElementById('email-error').textContent = '请输入邮箱';
        return;
      }
      if (validate.email(email)) {
        document.getElementById('email-error').textContent = validate.email(email);
        return;
      }
      if (!password) {
        document.getElementById('password-error').textContent = '请输入密码';
        return;
      }
      if (password.length < 6) {
        document.getElementById('password-error').textContent = '密码长度至少为6位';
        return;
      }
      if (!confirmPassword) {
        document.getElementById('confirmPassword-error').textContent = '请再次输入密码';
        return;
      }
      if (password !== confirmPassword) {
        document.getElementById('confirmPassword-error').textContent = '两次输入的密码不一致';
        return;
      }

      // Simulate registration (in real app, this would call an API)
      if (auth.register && auth.register(username, email, password)) {
        const errorDiv = document.getElementById('register-error');
        errorDiv.textContent = '';
        errorDiv.style.color = 'var(--color-success)';
        errorDiv.textContent = '注册成功！即将跳转到登录页面。';
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      } else {
        document.getElementById('register-error').textContent = '注册失败，用户名或邮箱可能已被使用';
      }
    });
  </script>
</body>
</html>
